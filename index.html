<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>姿勢チェックアプリ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>

    <div id="permissionOverlay">
        <h2>センサーの使用許可</h2>
        <p>姿勢を計測するために、スマートフォンのジャイロセンサーを使用します。</p>
        <button id="requestBtn" class="wood-button request-btn">許可して開始</button>
    </div>

    <main class="app-container">
        <header>
            <h1>姿勢チェック</h1>
        </header>

        <section class="status-card" id="statusCard">
            <div class="icon-wrapper">
                <img src="icon-512.png" alt="App Icon" id="appIcon">
            </div>
            <div class="status-info">
                <p class="label-sm">現在の状態</p>
                <h2 id="statusText">待機中</h2>
            </div>
        </section>

        <section class="dashboard">
            <div class="data-box">
                <span>現在の角度</span>
                <strong id="angleText">0.0°</strong>
            </div>
            <div class="data-box">
                <span>警告回数</span>
                <strong id="warningCount">0</strong>
            </div>
            <div class="data-box">
                <span>姿勢スコア</span>
                <strong id="scoreText">100</strong>
            </div>
            <div class="data-box">
                <span>目標値</span>
                <strong id="goalText">15.0° 以内</strong>
            </div>
        </section>

        <section class="settings-area">
            <div class="settings-label">
                <span>許容角度の調整</span>
                <span id="thresholdDisplay">15°</span>
            </div>
            <input type="range" id="thresholdRange" min="5" max="45" value="15">
        </section>

        <footer class="controls">
            <button id="startBtn" class="wood-button">センサー開始</button>
            <p id="message" class="info-msg">ボタンを押して計測を開始してください</p>
        </footer>
    </main>

  <script src="main.js?v=7"></script>
</body>
</html>
